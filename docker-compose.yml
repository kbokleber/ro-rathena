services:
  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?}
      MARIADB_DATABASE: ${DB_NAME:-ragnarok}
      MARIADB_USER: ${DB_USER:-ragnarok}
      MARIADB_PASSWORD: ${DB_PASSWORD:?}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql

  rathena:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    ports:
      - "6900:6900"
      - "6121:6121"
      - "5121:5121"
    environment:
      DB_NAME: ${DB_NAME:-ragnarok}
      DB_USER: ${DB_USER:-ragnarok}
      DB_PASSWORD: ${DB_PASSWORD:?}
      DB_HOST: db
      DB_PORT: 3306
      PUBLIC_IP: ${PUBLIC_IP:?}
    volumes:
      - type: bind
        source: ./coolify/import/inter_conf.txt
        target: /rathena/conf/import/inter_conf.txt
        content: |
          sql_connection: {
              id: "${DB_USER}"
              pw: "${DB_PASSWORD}"
              db: "${DB_NAME}"
              host: "${DB_HOST}"
              port: ${DB_PORT}
          }

      - type: bind
        source: ./coolify/import/login_athena.conf
        target: /rathena/conf/import/login_athena.conf
        content: |
          login_server_ip: 0.0.0.0
          login_server_port: 6900
          new_account: yes

      - type: bind
        source: ./coolify/import/char_athena.conf
        target: /rathena/conf/import/char_athena.conf
        content: |
          char_server_ip: 0.0.0.0
          char_server_port: 6121
          login_server_ip: 127.0.0.1
          login_server_port: 6900

      - type: bind
        source: ./coolify/import/map_athena.conf
        target: /rathena/conf/import/map_athena.conf
        content: |
          map_server_ip: 0.0.0.0
          char_server_ip: 127.0.0.1
          char_server_port: 6121

      - type: bind
        source: ./coolify/import/subnet_athena.conf
        target: /rathena/conf/import/subnet_athena.conf
        content: |
          subnet: (
            {
              subnet: "0.0.0.0/0"
              char_ip: "${PUBLIC_IP}"
              map_ip: "${PUBLIC_IP}"
            }
          )

      - type: bind
        source: ./coolify/init/init-db.sh
        target: /init/init-db.sh
        content: |
          #!/bin/bash
          set -e
          until mariadb-admin ping -h "${DB_HOST}" -u"${DB_USER}" -p"${DB_PASSWORD}" --silent; do
            sleep 2
          done

          if ! mariadb -h "${DB_HOST}" -u"${DB_USER}" -p"${DB_PASSWORD}" "${DB_NAME}" -e "SHOW TABLES LIKE 'login';" | grep -q login; then
            mariadb -h "${DB_HOST}" -u"${DB_USER}" -p"${DB_PASSWORD}" "${DB_NAME}" < /rathena/sql-files/main.sql
            if [ -f /rathena/sql-files/logs.sql ]; then
              mariadb -h "${DB_HOST}" -u"${DB_USER}" -p"${DB_PASSWORD}" "${DB_NAME}" < /rathena/sql-files/logs.sql
            fi
          fi

          cd /rathena
          ./login-server &
          ./char-server &
          ./map-server &
          wait -n
    command: ["/bin/bash", "/init/init-db.sh"]

volumes:
  db_data: